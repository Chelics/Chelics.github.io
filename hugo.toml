baseURL = 'https://Chelics.github.io/' # TODO: 记得改这里
languageCode = 'zh-cn'
title = 'MY SPACE' # TODO: 记得改这里
theme = 'FixIt'

# 开启强制中文支持，优化搜索和字数统计
hasCJKLanguage = true

[params]
  # 默认主题模式 ("light", "dark", "auto")
  defaultTheme = "auto"

  # 1. 作者信息配置 (显示在侧边栏或底部)
  [params.author]
    name = "你的名字"
    email = "youremail@example.com"
    # 头像图片放在根目录的 static/images/avatar.webp
    avatar = "/images/avatar.webp" 

  # 2. 顶栏配置
  [params.header]
    [params.header.title]
      icon = "fa-solid fa-microchip"
      name = "个人实验室"

  # 3. 首页打字机效果 (提升 UI 灵动感)
  [params.index.typeit]
    enable = true
    # 这里写你想展示的座右铭或自我介绍
    content = "一名准研究生，正在构建自己的第二大脑。持续学习，保持好奇。"
    speed = 100
    cursor = true

  # 4. 回到顶部与阅读进度
  [params.backtotop]
    enable = true
    scrollpercent = true # 在回到顶部按钮上显示阅读百分比

[menu]
  [[menu.main]]
    identifier = "posts"
    pre = "<i class='fa-solid fa-archive fa-fw' aria-hidden='true'></i>"
    name = "博文"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    identifier = "categories"
    pre = "<i class='fa-solid fa-th fa-fw' aria-hidden='true'></i>"
    name = "分类"
    url = "/categories/"
    weight = 2
  [[menu.main]]
    identifier = "about"
    pre = "<i class='fa-solid fa-user-circle fa-fw' aria-hidden='true'></i>"
    name = "关于"
    url = "/about/"
    weight = 3

[languages]
  [languages.zh-cn]
    languageName = "简体中文"
    hasFullContent = true